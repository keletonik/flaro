<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AIDE FIP Assistant</title>
    <meta name="description" content="On-site fire panel technical assistant for dry fire technicians." />

    <!-- Theme colour matched to the salmon palette in both modes so the
         browser chrome and standalone-app status bar tints correctly. -->
    <meta name="theme-color" content="#FAF7F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B1714" media="(prefers-color-scheme: dark)" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AIDE FIP" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist:wght@300..800&family=Geist+Mono:wght@300..800&family=JetBrains+Mono:wght@300..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Prevent theme flash. Default = salmon (warm light). Dark variants are
      // listed explicitly; everything else stays in light mode. Kept in sync
      // with src/lib/theme.tsx — DARK_THEMES list.
      (function(){
        var t = localStorage.getItem("ops-theme-variant") || "salmon";
        document.documentElement.setAttribute("data-theme", t);
        var DARK = ["salmon-dark","deep-navy","slate-dark","graphite-green","operator","fieldkit","atelier","circuit","terminal"];
        if (DARK.indexOf(t) !== -1) document.documentElement.classList.add("dark");
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
