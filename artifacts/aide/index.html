<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AIDE · Service Ops</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist:wght@300..800&family=Geist+Mono:wght@300..800&family=JetBrains+Mono:wght@300..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Prevent theme flash — set dark class and data-theme before paint
      (function(){var t=localStorage.getItem("ops-theme-variant")||"deep-navy";document.documentElement.setAttribute("data-theme",t);if(["deep-navy","slate-dark","graphite-green","operator","fieldkit","atelier","circuit","terminal"].includes(t))document.documentElement.classList.add("dark")})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
