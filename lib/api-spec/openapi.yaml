components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    Job:
      type: object
      properties:
        id:
          type: string
        taskNumber:
          type: ["string", "null"]
        site:
          type: string
        address:
          type: ["string", "null"]
        client:
          type: string
        contactName:
          type: ["string", "null"]
        contactNumber:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        actionRequired:
          type: string
        priority:
          type: string
          enum: [Critical, High, Medium, Low]
        status:
          type: string
          enum: [Open, "In Progress", Booked, Blocked, Waiting, Done]
        assignedTech:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        uptickNotes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - site
        - client
        - actionRequired
        - priority
        - status
        - uptickNotes
        - createdAt
        - updatedAt
    CreateJobBody:
      type: object
      properties:
        taskNumber:
          type: string
        site:
          type: string
        address:
          type: string
        client:
          type: string
        contactName:
          type: string
        contactNumber:
          type: string
        contactEmail:
          type: string
        actionRequired:
          type: string
        priority:
          type: string
          enum: [Critical, High, Medium, Low]
        status:
          type: string
          enum: [Open, "In Progress", Booked, Blocked, Waiting, Done]
        assignedTech:
          type: string
        dueDate:
          type: string
        notes:
          type: string
      required:
        - site
        - client
        - actionRequired
        - priority
        - status
    UpdateJobBody:
      type: object
      properties:
        taskNumber:
          type: string
        site:
          type: string
        address:
          type: string
        client:
          type: string
        contactName:
          type: string
        contactNumber:
          type: string
        contactEmail:
          type: string
        actionRequired:
          type: string
        priority:
          type: string
          enum: [Critical, High, Medium, Low]
        status:
          type: string
          enum: [Open, "In Progress", Booked, Blocked, Waiting, Done]
        assignedTech:
          type: string
        dueDate:
          type: string
        notes:
          type: string
        uptickNote:
          type: string

    PurchaseOrderChecklistItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        done:
          type: boolean
        doneAt:
          type: ["string", "null"]
      required: [id, label, done]
    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
        poNumber:
          type: string
        client:
          type: string
        site:
          type: ["string", "null"]
        amount:
          type: ["string", "null"]
        status:
          type: string
          enum: [Received, Matched, Approved, Actioned, Completed, Cancelled]
        defectId:
          type: ["string", "null"]
        quoteId:
          type: ["string", "null"]
        quoteNumber:
          type: ["string", "null"]
        taskNumber:
          type: ["string", "null"]
        emailSubject:
          type: ["string", "null"]
        emailFrom:
          type: ["string", "null"]
        emailReceivedAt:
          type: ["string", "null"]
          format: date-time
        emailBody:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
          format: date-time
        approvedBy:
          type: ["string", "null"]
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderChecklistItem"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - poNumber
        - client
        - status
        - checklist
        - createdAt
        - updatedAt
    CreatePurchaseOrderBody:
      type: object
      properties:
        poNumber:
          type: string
        client:
